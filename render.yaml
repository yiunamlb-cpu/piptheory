# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect this repo in Render dashboard → auto-detected.
services:
  - type: web
    name: piptheory
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # Set these manually in Render dashboard → Environment:
      # - OPENROUTER_API_KEY   (only if running pipeline on Render)
      # - FRED_API_KEY          (only if running pipeline on Render)
      # - ADMIN_TOKEN           (auto-generated if not set)
