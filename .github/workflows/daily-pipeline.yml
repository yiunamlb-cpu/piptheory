name: Strength Update

# Retired the LLM "bias engine" (research desk) to cut spend. This recomputes
# the mechanical, free currency-strength meter + price chart and commits them.
# Runs every 4 hours (offset off the hour to dodge GitHub's top-of-hour queue).

on:
  schedule:
    - cron: "15 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  strength:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute currency strength meter
        env:
          PYTHONPATH: ${{ github.workspace }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m src.data.currency_strength --persist

      - name: Compute price-based currency performance
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m src.data.price_strength --persist

      - name: Commit and push results
        run: |
          git config user.name "piptheory-bot"
          git config user.email "bot@piptheory.com"
          git add --force state/currency_strength.json state/currency_strength_latest.json state/price_strength.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "state: daily strength update"
          git pull --rebase origin main
          git push origin main

      - name: Ping deployed site
        run: |
          sleep 45
          curl -s -o /dev/null -w "HTTP %{http_code}\n" --max-time 120 https://piptheory.com/ || true
