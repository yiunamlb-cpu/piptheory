# Economic event calendar — manually maintained.
#
# Update this file weekly with events for the next 4-6 weeks. The Tradability
# Filter (Layer 4b) reads it to flag setups blocked by major upcoming catalysts.
#
# Reference sources to update from:
#   - https://www.bls.gov/schedule/news_release/cpi.htm  (CPI / inflation)
#   - https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm (FOMC)
#   - https://www.ecb.europa.eu/press/calendars/mgcgc/html/index.en.html (ECB)
#   - https://www.boj.or.jp/en/mopo/mpmsche_minu/ (BoJ)
#   - https://www.bankofengland.co.uk/monetary-policy-summary-and-minutes (BoE)
#
# Schema per event:
#   date:     YYYY-MM-DD
#   time:     "HH:MM TZ" (08:30 ET, 14:30 CET, etc.) — informational
#   name:     Short description
#   severity: high | medium | low
#   category: inflation | employment | central_bank | growth | sentiment | other
#   affects:  list of instrument symbols this typically moves
#   notes:    Optional one-liner the agent will read

