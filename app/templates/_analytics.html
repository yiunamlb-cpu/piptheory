{% if ga_id %}<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ ga_id }}"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','{{ ga_id }}');</script>
{% endif %}
{% if ad_config and ad_config.adsense_publisher_id %}<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ ad_config.adsense_publisher_id }}" crossorigin="anonymous"></script>
{% endif %}
