<div class="cs-cookie" id="csCookie" hidden>
  <span><strong>This site uses cookies.</strong> We use them for site analytics and to show non-intrusive ads. By continuing to browse you agree to our <a href="/privacy">privacy policy</a>.</span>
  <button class="cs-cookie-btn" onclick="this.parentElement.hidden=true;try{localStorage.setItem('pt_cookie_ok','1')}catch(e){}">Got it</button>
</div>
<script>(function(){var b=document.getElementById('csCookie');if(!b)return;try{if(!localStorage.getItem('pt_cookie_ok'))b.hidden=false;}catch(e){b.hidden=false;}})();</script>
