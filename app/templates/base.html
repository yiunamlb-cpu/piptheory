<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FAFAF9">
  <title>{% block title %}nam-hedgefund{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tokens.css?v={{ static_version }}">
  {% if surface == "mobile" %}
  <link rel="stylesheet" href="/static/mobile.css?v={{ static_version }}">
  {% elif surface == "showcase" %}
  <link rel="stylesheet" href="/static/showcase.css?v={{ static_version }}">
  {% else %}
  <link rel="stylesheet" href="/static/desktop.css?v={{ static_version }}">
  {% endif %}
</head>
<body data-surface="{{ surface }}">
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
