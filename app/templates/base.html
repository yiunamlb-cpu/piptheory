<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FAFAF9">
  <title>{% block title %}piptheory{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v={{ static_version }}">
  <link rel="icon" type="image/png" sizes="180x180" href="/static/favicon.png?v={{ static_version }}">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon.png?v={{ static_version }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tokens.css?v={{ static_version }}">
  {% if ad_config and ad_config.adsense_publisher_id %}
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ ad_config.adsense_publisher_id }}" crossorigin="anonymous"></script>
  {% endif %}
  {% if surface == "mobile" %}
  <link rel="stylesheet" href="/static/mobile.css?v={{ static_version }}">
  {% else %}
  <link rel="stylesheet" href="/static/desktop.css?v={{ static_version }}">
  {% endif %}
</head>
<body data-surface="{{ surface }}">
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
